services:
  backend:
    build: ./backend
    environment:
      - PYTHONHTTPSVERIFY=0
      - REQUESTS_CA_BUNDLE=
    # platform: linux/amd64   # py_mini_racer 仅有 x86_64 预编译库，ARM64 Mac 需要此行
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./data:/app/data
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge
