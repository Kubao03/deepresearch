services:
  mcp-aktools:
    image: ghcr.nju.edu.cn/aahl/mcp-aktools
    ports:
      - "8808:80"
    environment:
      TZ: Asia/Shanghai
      TRANSPORT: ${TRANSPORT:-http}
      UV_INDEX_URL: https://mirrors.ustc.edu.cn/pypi/simple
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.connect(('localhost',80)); s.close()\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    environment:
      - PYTHONHTTPSVERIFY=0
      - REQUESTS_CA_BUNDLE=
      - AKTOOLS_URL=http://mcp-aktools:80/mcp
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./data:/app/data
    networks:
      - app-network
    depends_on:
      mcp-aktools:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge
